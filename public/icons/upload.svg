<?xml version="1.0" encoding="UTF-8"?>
<svg 
  xmlns="http://www.w3.org/2000/svg" 
  viewBox="0 0 24 24"
>
  <defs>
    <linearGradient id="uploadGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1E88E5"/>
    </linearGradient>
  </defs>

  <!-- Thicker Arrow Shaft -->
  <rect 
    x="10" 
    y="8" 
    width="4" 
    height="9" 
    rx="2"
    fill="url(#uploadGradient)"
  />

  <!-- Bigger Arrow Head -->
  <polygon 
    points="6,11 12,4 18,11"
    fill="url(#uploadGradient)"
  />

  <!-- Thicker Bottom Tray -->
  <rect 
    x="4" 
    y="18" 
    width="16" 
    height="3" 
    rx="1.5"
    fill="#90CAF9"
  />
</svg>
